name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r requirements.txt
          pip check

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Type check
        run: mypy

      - name: Tests with coverage
        run: pytest

      - name: Train production pipeline
        run: python scripts/train.py

      - name: Model metric gates
        run: python scripts/check.py metrics

      - name: Security scan (bandit)
        run: bandit -q -r src scripts -s B101 -x tests

      - name: Artifact threshold sync check
        run: python scripts/check.py sync

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt --no-deps --disable-pip

  thesis-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r requirements.txt
          pip check

      - name: Train pipeline + thesis analysis
        run: python scripts/train.py --thesis

      - name: Generate benchmark tables
        run: python scripts/benchmark.py

      - name: Cross-artifact sync check
        run: python scripts/check.py sync

      - name: Upload thesis reports
        uses: actions/upload-artifact@v4
        with:
          name: thesis-reports
          path: reports/thesis/
