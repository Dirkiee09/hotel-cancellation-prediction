name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Opt JavaScript actions into Node.js 24 immediately. GitHub will make this
# the default in June 2026 and remove Node.js 20 from runners in September
# 2026; this flag silences the deprecation warning until upstream actions
# publish their Node 24 major releases.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r requirements.txt
          pip check

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Type check
        run: mypy

      - name: Tests with coverage
        run: pytest

      - name: Train production pipeline
        run: python scripts/train.py

      - name: Artifact consistency check
        run: python scripts/check.py artifacts

      - name: Model metric gates
        run: python scripts/check.py metrics

      - name: Artifact threshold sync check
        run: python scripts/check.py sync

      - name: Algorithm fairness check (matched-capacity XGBoost vs LightGBM)
        run: python scripts/check.py fairness

      - name: Security scan (bandit)
        run: bandit -q -r src scripts -s B101 -x tests

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt --no-deps --disable-pip

      - name: Upload quality-job artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: quality-debug-${{ github.run_id }}
          path: |
            artifacts/
            reports/
          if-no-files-found: ignore
          retention-days: 7

  thesis-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: quality
    # NOTE: remote default branch was renamed to "Main" (capital M) during the
    # GitHub default-branch rename; gate on that exact ref. Using "main"
    # lowercase silently skipped this job for every push.
    if: github.event_name == 'push' && github.ref == 'refs/heads/Main'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r requirements.txt
          pip check

      - name: Train pipeline + thesis analysis
        run: python scripts/train.py --thesis

      - name: Generate benchmark tables
        run: python scripts/benchmark.py

      - name: Cross-artifact sync check
        run: python scripts/check.py sync

      - name: Upload thesis reports
        uses: actions/upload-artifact@v5
        with:
          name: thesis-reports
          path: reports/thesis/
