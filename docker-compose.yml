services:
  train:
    image: hotel-booking-cancellation:latest
    working_dir: /app
    command: ["python", "scripts/train.py"]
    volumes:
      - ./data:/app/data:ro
      - ./artifacts:/app/artifacts
      - ./reports:/app/reports

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hotel-booking-cancellation:latest
    working_dir: /app
    command: ["python", "-m", "uvicorn", "src.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
